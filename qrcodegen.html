<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shupaxz QR Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Cloud Soft';
            src: local('Cloud Soft'), local('CloudSoft');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cloud Soft', 'Prompt', sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #0a0a20 0%, #020205 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            /* ตั้งค่ามุมมอง 3D ให้พื้นหลัง */
            perspective: 1200px; 
        }

        /* ---------------- True 3D Box Engine ---------------- */
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            transform-style: preserve-3d;
        }

        /* กล่องคุมตำแหน่งของแต่ละลูกบาศก์ */
        .cube-wrapper {
            position: absolute;
            bottom: -200px;
            transform-style: preserve-3d;
            animation: floatUp 15s infinite linear;
        }

        /* ตัวลูกบาศก์ 3 มิติ และแอนิเมชันหมุน */
        .cube {
            position: relative;
            width: var(--size);
            height: var(--size);
            transform-style: preserve-3d;
            animation: spinCube 8s infinite linear;
        }

        /* หน้าทั้ง 6 ด้านของลูกบาศก์ */
        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(1px);
        }

        /* ชุดสี Cyan */
        .cube.cyan .face {
            border-color: rgba(0, 255, 255, 0.6);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5), inset 0 0 10px rgba(0, 255, 255, 0.3);
        }

        /* ชุดสี Magenta */
        .cube.magenta .face {
            border-color: rgba(255, 0, 255, 0.6);
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5), inset 0 0 10px rgba(255, 0, 255, 0.3);
        }

        /* ประกอบร่าง 3D (ใช้ CSS Variables --size) */
        .front  { transform: translateZ(calc(var(--size) / 2)); }
        .back   { transform: rotateY(180deg) translateZ(calc(var(--size) / 2)); }
        .right  { transform: rotateY(90deg) translateZ(calc(var(--size) / 2)); }
        .left   { transform: rotateY(-90deg) translateZ(calc(var(--size) / 2)); }
        .top    { transform: rotateX(90deg) translateZ(calc(var(--size) / 2)); }
        .bottom { transform: rotateX(-90deg) translateZ(calc(var(--size) / 2)); }

        @keyframes floatUp {
            0%   { top: 110%; opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { top: -20%; opacity: 0; }
        }

        @keyframes spinCube {
            0%   { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateX(360deg) rotateY(720deg) rotateZ(360deg); }
        }

        /* ---------------- 3D Glassmorphism UI ---------------- */
        .main-container {
            position: relative;
            z-index: 10;
            animation: floatingUI 6s ease-in-out infinite;
            transform-style: preserve-3d;
        }

        @keyframes floatingUI {
            0%, 100% { transform: translateY(0) rotateX(2deg) rotateY(-2deg); }
            50%      { transform: translateY(-15px) rotateX(-2deg) rotateY(2deg); }
        }

        .glass-panel {
            background: linear-gradient(135deg, rgba(30, 30, 45, 0.7), rgba(15, 15, 25, 0.8));
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid rgba(0, 255, 255, 0.5);
            border-left: 1px solid rgba(0, 255, 255, 0.5);
            border-right: 1px solid rgba(255, 0, 255, 0.2);
            border-bottom: 1px solid rgba(255, 0, 255, 0.2);
            border-radius: 24px;
            padding: 45px;
            width: 90vw;
            max-width: 550px;
            text-align: center;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.8), 
                inset 0 0 30px rgba(0, 255, 255, 0.05),
                0 0 20px rgba(0, 255, 255, 0.2);
            transition: all 0.4s ease;
        }

        .glass-panel:hover {
            box-shadow: 
                0 40px 80px rgba(0, 0, 0, 0.9), 
                0 0 40px rgba(0, 255, 255, 0.3);
        }

        /* 3D Neon Title */
        h1 {
            font-size: 3rem;
            margin-bottom: 5px;
            color: #fff;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #0ff,
                0 0 20px #0ff,
                0 0 40px #0ff;
            letter-spacing: 3px;
            font-weight: 700;
        }

        p.subtitle {
            color: #b3b3b3;
            margin-bottom: 35px;
            font-size: 1.1rem;
        }

        /* ---------------- Upload Area ---------------- */
        .upload-area {
            border: 2px dashed rgba(0, 255, 255, 0.4);
            border-radius: 16px;
            padding: 50px 20px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }

        .upload-area::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0,255,255,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .upload-area:hover::before, .upload-area.dragover::before {
            opacity: 1;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: #0ff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2) inset;
        }

        .upload-area input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; cursor: pointer; z-index: 2;
        }

        .upload-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            display: inline-block;
            filter: drop-shadow(0 0 10px #0ff);
        }

        /* ---------------- Results Area ---------------- */
        #result-section {
            display: none;
            margin-top: 20px;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .qr-wrapper {
            background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 25px;
            border-radius: 20px;
            display: inline-block;
            margin: 20px 0;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }

        #qrcode {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
        }

        .save-btn {
            display: block;
            width: 100%;
            margin-top: 20px;
            background: linear-gradient(90deg, #0ff, #d900ff);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.4);
            transition: all 0.3s;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .save-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
        }

        .link-box {
            display: flex;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 0, 255, 0.5);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .link-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 15px;
            font-size: 1rem;
            outline: none;
        }

        .link-box button {
            background: rgba(255, 0, 255, 0.2);
            color: #f0f;
            border: none;
            padding: 0 25px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .link-box button:hover {
            background: #f0f;
            color: #000;
            box-shadow: 0 0 20px #f0f;
        }

        .loading {
            display: none;
            color: #0ff;
            margin-top: 30px;
            font-size: 1.5rem;
            font-weight: 600;
            text-shadow: 0 0 10px #0ff;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.6; text-shadow: 0 0 5px #0ff; }
            to { opacity: 1; text-shadow: 0 0 20px #0ff, 0 0 30px #0ff; }
        }

    </style>
</head>
<body>

    <div class="scene" id="scene"></div>

    <div class="main-container">
        <div class="glass-panel">
            <h1>SHUPAXZ QR</h1>
            <p class="subtitle">อัปโหลดไฟล์ แล้วแปลงเป็นลิงก์พร้อม QR Code</p>

            <div class="upload-area" id="upload-area">
                <input type="file" id="file-input">
                <div class="upload-icon">📁</div>
                <h3 style="color: #fff; font-weight: 400; font-size: 1.4rem; z-index: 5; position: relative;">คลิกหรือลากไฟล์มาวางที่นี่</h3>
                <p style="margin-bottom: 0; margin-top: 10px; font-size: 0.9rem; color: #aaa; z-index: 5; position: relative;">รองรับทุกนามสกุลไฟล์</p>
            </div>

            <div class="loading" id="loading">🚀 กำลังสร้าง Shupaxz Link...</div>

            <div id="result-section">
                <h3 style="color: #0ff; text-shadow: 0 0 10px #0ff; font-size: 1.5rem;">🎉 สร้างสำเร็จ!</h3>
                
                <div class="qr-wrapper">
                    <div id="qrcode"></div>
                    <button onclick="saveQRCode()" class="save-btn">💾 SAVE QR CODE</button>
                </div>
                
                <div class="link-box">
                    <input type="text" id="share-link" readonly value="">
                    <button onclick="copyLink()" id="copy-btn">COPY</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. สร้าง 3D Cubes พื้นหลัง (ของจริง 6 ด้าน)
        const scene = document.getElementById('scene');
        const cubeCount = 20; // จำนวนกล่อง

        for (let i = 0; i < cubeCount; i++) {
            // สร้าง Wrapper เพื่อคุมตำแหน่งการลอยขึ้น
            let wrapper = document.createElement('div');
            wrapper.classList.add('cube-wrapper');
            
            // สุ่มตำแหน่ง X (ซ้ายไปขวา) และ Z (ความตื้นลึก)
            wrapper.style.left = Math.random() * 100 + 'vw';
            wrapper.style.transform = `translateZ(${Math.random() * -600}px)`; // ดันบางกล่องไปข้างหลัง
            wrapper.style.animationDuration = (Math.random() * 15 + 10) + 's';
            wrapper.style.animationDelay = (Math.random() * -20) + 's'; // ให้เริ่มกระจายๆ กัน

            // สร้างตัวลูกบาศก์
            let cube = document.createElement('div');
            cube.classList.add('cube');
            
            // สุ่มขนาด และส่งค่าไปที่ CSS Variable --size
            let size = Math.random() * 60 + 30; 
            cube.style.setProperty('--size', size + 'px');
            
            // สุ่มสี (Cyan หรือ Magenta)
            let isMagenta = Math.random() > 0.5;
            cube.classList.add(isMagenta ? 'magenta' : 'cyan');
            
            // สุ่มความเร็วและทิศทางการหมุนของลูกบาศก์
            cube.style.animationDuration = (Math.random() * 8 + 4) + 's';
            cube.style.animationDirection = Math.random() > 0.5 ? 'normal' : 'reverse';

            // สร้างหน้าทั้ง 6 ด้านประกอบเป็นกล่อง
            const faces = ['front', 'back', 'right', 'left', 'top', 'bottom'];
            faces.forEach(faceClass => {
                let face = document.createElement('div');
                face.classList.add('face', faceClass);
                cube.appendChild(face);
            });

            wrapper.appendChild(cube);
            scene.appendChild(wrapper);
        }

        // 2. จัดการ Upload และ UI
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const loading = document.getElementById('loading');
        const resultSection = document.getElementById('result-section');
        const shareLinkInput = document.getElementById('share-link');
        const qrcodeDiv = document.getElementById('qrcode');

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                processFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                processFile(e.target.files[0]);
            }
        });

        // 3. จำลองการสร้าง QR
        function processFile(file) {
            uploadArea.style.display = 'none';
            resultSection.style.display = 'none';
            loading.style.display = 'block';

            setTimeout(() => {
                loading.style.display = 'none';
                resultSection.style.display = 'block';

                const randomId = Math.random().toString(36).substring(2, 10);
                const fakeUrl = `https://shupaxz.app/f/${randomId}`;
                
                shareLinkInput.value = fakeUrl;

                qrcodeDiv.innerHTML = "";
                new QRCode(qrcodeDiv, {
                    text: fakeUrl,
                    width: 180,
                    height: 180,
                    colorDark : "#020205",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            }, 1800);
        }

        // 4. ฟังก์ชัน Save ภาพ QR Code
        function saveQRCode() {
            const qrCanvas = document.querySelector('#qrcode canvas');
            const qrImg = document.querySelector('#qrcode img');
            let imageSrc = '';
            
            if (qrCanvas && qrCanvas.style.display !== 'none') {
                imageSrc = qrCanvas.toDataURL("image/png");
            } else if (qrImg && qrImg.src) {
                imageSrc = qrImg.src;
            }

            if(imageSrc) {
                const link = document.createElement('a');
                link.href = imageSrc;
                link.download = 'Shupaxz_QRCode.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } else {
                alert("กรุณารอสักครู่ให้ QR Code โหลดเสร็จก่อนเซฟครับ");
            }
        }

        // 5. ฟังก์ชัน Copy ลิ้งก์
        function copyLink() {
            shareLinkInput.select();
            document.execCommand("copy");
            const copyBtn = document.getElementById('copy-btn');
            copyBtn.innerText = "COPIED!";
            copyBtn.style.background = "#fff";
            copyBtn.style.color = "#000";
            
            setTimeout(() => {
                copyBtn.innerText = "COPY";
                copyBtn.style.background = "rgba(255, 0, 255, 0.2)";
                copyBtn.style.color = "#f0f";
            }, 2000);
        }
    </script>
</body>
</html>
